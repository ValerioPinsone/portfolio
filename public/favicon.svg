<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="4" fill="#09090b"/>
  <!-- neon border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="3.5" fill="none" stroke="#00e5ff" stroke-width="0.75" stroke-opacity="0.35"/>
  <!-- > prompt in cyan -->
  <text x="3" y="13" font-family="'Courier New',monospace" font-size="9" font-weight="700" fill="#00e5ff">&gt;</text>
  <!-- VP in white -->
  <text x="3" y="27" font-family="'Courier New',monospace" font-size="15" font-weight="700" fill="#f4f4f5">VP</text>
  <!-- cyan underline accent -->
  <rect x="3" y="29" width="14" height="1.5" rx="0.75" fill="#00e5ff" opacity="0.6"/>
</svg>
